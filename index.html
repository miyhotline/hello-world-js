<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Hello World</title>
</head>
<body>
    <h1 id="display">Waiting for JavaScript...</h1>

    <script>
        // This is your JavaScript running in the browser
        const message = "Hello World from GitHub Pages!";
        document.getElementById("display").innerText = message;
        console.log("JS is running successfully!");
    </script>
</body>
</html>
